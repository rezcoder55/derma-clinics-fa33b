<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      .primary { fill: #5a2366; }
      .secondary { fill: #4a4a4a; }
      .text-title { font-family: 'Tajawal', sans-serif; font-size: 32px; font-weight: bold; fill: #5a2366; }
      .text-subtitle { font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: bold; fill: #4a4a4a; }
    </style>
  </defs>

  <!-- Letter T with leaves -->
  <g transform="translate(20, 10)">
    <!-- Arch -->
    <path class="primary" d="M40 10 C 20 10, 0 30, 0 60 C 0 80, 10 95, 20 100 L 25 95 C 10 85, 5 70, 5 55 C 5 35, 20 20, 40 20 C 60 20, 75 35, 75 55 L 85 55 C 85 30, 65 10, 40 10 Z"/>
    
    <!-- T Vertical -->
    <rect class="primary" x="35" y="25" width="15" height="75" rx="2" />
    
    <!-- T Horizontal -->
    <rect class="primary" x="15" y="25" width="55" height="12" rx="2" />
    
    <!-- Leaves -->
    <path class="primary" d="M 0 70 C -10 60, -15 70, -5 80 C -15 85, -5 95, 5 90 C 0 100, 15 105, 20 95 C 15 105, 25 110, 30 100 C 20 115, 10 105, 20 95 Z" transform="translate(10, -5) scale(1.2)" />
    
    <!-- Dot -->
    <circle class="primary" cx="75" cy="25" r="5" />
  </g>

  <!-- Text -->
  <g transform="translate(120, 50)">
    <text class="text-title" x="0" y="0">عيادات توجه الطبية</text>
    <text class="text-subtitle" x="0" y="30">تجميل | ليزر | عناية بالبشرة</text>
    
    <!-- Decorative line -->
    <rect class="primary" x="0" y="-35" width="150" height="3" rx="1" />
    <rect class="primary" x="0" y="-20" width="80" height="3" rx="1" />
  </g>
</svg>
